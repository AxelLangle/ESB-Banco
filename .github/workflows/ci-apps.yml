name: CI — Apps Consumidoras
 
on:
  push:
    branches: [develop]
    paths: ["apps/**"]
  pull_request:
    branches: [develop, main]
    paths: ["apps/**"]
 
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [app-movil, cajero-atm, cajero-red]
    steps:
      - uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
 
      - name: Install dependencies
        run: npm ci
 
      - name: Lint — ${{ matrix.app }}
        run: npm run lint -w apps/${{ matrix.app }}
 
      - name: Test — ${{ matrix.app }}
        run: npm test -w apps/${{ matrix.app }}

