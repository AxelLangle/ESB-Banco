name: CI — ESB Core
 
on:
  push:
    branches: [develop]
    paths:
      - "esb-core/**"
      - "shared/**"
  pull_request:
    branches: [develop, main]
    paths:
      - "esb-core/**"
      - "shared/**"
 
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
 
      - name: Install dependencies
        run: npm ci
 
      - name: Lint
        run: npm run lint -w esb-core
 
      - name: Unit tests
        run: npm test -w esb-core
 
      - name: Validate canonical envelope schema
        run: node esb-core/canonical/validators/validate-schema.js

