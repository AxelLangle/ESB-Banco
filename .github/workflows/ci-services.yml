name: CI — Servicios de Negocio
 
on:
  push:
    branches: [develop]
    paths: ["services/**"]
  pull_request:
    branches: [develop, main]
    paths: ["services/**"]
 
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [retiro, deposito, transferencia]
    steps:
      - uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
 
      - name: Install dependencies
        run: npm ci
 
      - name: Lint — ${{ matrix.service }}
        run: npm run lint -w services/${{ matrix.service }}
 
      - name: Test — ${{ matrix.service }}
        run: npm test -w services/${{ matrix.service }}

